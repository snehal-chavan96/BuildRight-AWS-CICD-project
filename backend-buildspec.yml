version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing backend dependencies...
      - cd backend

  build:
    commands:
      - echo Building Spring Boot application...
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Backend build completed
      - echo "DB_URL=jdbc:mysql://${DB_HOST}/${DB_NAME}" > scripts/runtime.env
      - echo "DB_USERNAME=${DB_USERNAME}" >> scripts/runtime.env
      - echo "DB_PASSWORD=${DB_PASSWORD}" >> scripts/runtime.env
      - echo "AWS_REGION=${AWS_REGION}" >> scripts/runtime.env
      - echo "BACKEND_FILES_BUCKET=${BACKEND_FILES_BUCKET}" >> scripts/runtime.env

artifacts:
  files:
    - backend/target/*.jar
    - appspec.yml
    - scripts/**/*
