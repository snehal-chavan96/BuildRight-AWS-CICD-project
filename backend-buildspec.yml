version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing backend dependencies...
      - cd backend

  build:
    commands:
      - echo Building Spring Boot application...
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Backend build completed

artifacts:
  files:
    - backend/target/*.jar
    - appspec.yml
    - scripts/**/*