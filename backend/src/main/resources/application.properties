spring.application.name=Buildright
server.port=8080
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (HS256) — secret must be >= 256 bits for Keys.hmacShaKeyFor
jwt.secret=BuildRightJWTSecretKeyMustBeAtLeast256BitsLongForHS256SigningAlgorithm2026BuildRight
jwt.expiration-ms=86400000

# AWS S3 Configuration
AWS_REGION=${AWS_REGION}
AWS_BUCKET_NAME=${BACKEND_FILES_BUCKET}

# Spring Boot Actuator — expose only /actuator/health for ALB health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

