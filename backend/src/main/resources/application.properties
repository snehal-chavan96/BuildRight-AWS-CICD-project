spring.application.name=Buildright
server.port=8080
spring.datasource.url=jdbc:mysql://buildright-app-db.cfugowg0e22z.ap-south-1.rds.amazonaws.com/buildright
spring.datasource.username=admin
spring.datasource.password=admin1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (HS256) — secret must be >= 256 bits for Keys.hmacShaKeyFor
jwt.secret=BuildRightJWTSecretKeyMustBeAtLeast256BitsLongForHS256SigningAlgorithm2026BuildRight
jwt.expiration-ms=86400000

# AWS S3 Configuration
AWS_REGION=ap-south-1
AWS_BUCKET_NAME=buildright-1

# Spring Boot Actuator — expose only /actuator/health for ALB health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


