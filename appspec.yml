version: 0.0
os: linux

files:
  - source: backend/target/buildright-app.jar
    destination: /home/ec2-user/app
  - source: scripts/runtime.env
    destination: /home/ec2-user/app

permissions:
  - object: /home/ec2-user/app
    owner: ec2-user
    group: ec2-user

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: ec2-user
